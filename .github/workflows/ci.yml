name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-scorer:
    name: Python scorer (router.py)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime deps
        run: pip install -r requirements.txt

      - name: Smoke-test router CLI
        run: python router.py "Write a REST API in Python" --json

      - name: Install test deps
        run: pip install pytest numpy

      - name: Run pytest
        run: python -m pytest gateway/tests/test_router.py -v

  typescript-gateway:
    name: TypeScript gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gateway/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
